<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 健康生活助手 🌈</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Nunito', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 50%, #a18cd1 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }
        
        /* 可爱背景装饰 */
        body::before {
            content: '🌸';
            position: absolute;
            top: 10%;
            left: 10%;
            font-size: 4rem;
            animation: float 4s ease-in-out infinite;
            opacity: 0.6;
        }
        
        body::after {
            content: '💖';
            position: absolute;
            bottom: 15%;
            right: 10%;
            font-size: 3rem;
            animation: float 4s ease-in-out infinite 2s;
            opacity: 0.6;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
        }
        
        .login-container {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 30px;
            padding: 50px 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 20px 60px rgba(255, 107, 157, 0.3);
            position: relative;
            z-index: 10;
            backdrop-filter: blur(10px);
        }
        
        .login-header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .login-icon {
            font-size: 4rem;
            background: linear-gradient(135deg, #ff6b9d, #ffa751);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 15px;
            display: block;
        }
        
        .login-header h1 {
            font-size: 2.2rem;
            background: linear-gradient(135deg, #ff6b9d, #c93cff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
            margin-bottom: 10px;
        }
        
        .login-header p {
            color: #666;
            font-size: 1.1rem;
        }
        
        /* 标签页 */
        .auth-tabs {
            display: flex;
            margin-bottom: 30px;
            background: #ffe0e6;
            border-radius: 20px;
            padding: 5px;
        }
        
        .auth-tab {
            flex: 1;
            padding: 12px;
            background: none;
            border: none;
            font-size: 1.1rem;
            color: #ff6b9d;
            cursor: pointer;
            transition: all 0.3s;
            border-radius: 15px;
            font-weight: 700;
            font-family: inherit;
        }
        
        .auth-tab.active {
            background: white;
            box-shadow: 0 4px 15px rgba(255, 107, 157, 0.3);
            color: #ff6b9d;
        }
        
        /* 表单 */
        .auth-form {
            display: none;
            animation: fadeIn 0.3s ease;
        }
        
        .auth-form.active {
            display: block;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .form-group {
            margin-bottom: 25px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 10px;
            color: #333;
            font-weight: 700;
            font-size: 1.05rem;
        }
        
        .form-group label i {
            margin-right: 8px;
            color: #ff6b9d;
        }
        
        .form-group input {
            width: 100%;
            padding: 14px 18px;
            border: 3px solid #ffe0e6;
            border-radius: 15px;
            font-size: 1rem;
            transition: all 0.3s;
            font-family: inherit;
            background: #fff5f7;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #ff6b9d;
            background: white;
            box-shadow: 0 0 0 4px rgba(255, 107, 157, 0.2);
        }
        
        .auth-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #ff6b9d, #ff4757);
            color: white;
            border: none;
            border-radius: 20px;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
            box-shadow: 0 6px 20px rgba(255, 107, 157, 0.4);
            font-family: inherit;
        }
        
        .auth-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(255, 107, 157, 0.6);
        }
        
        .auth-btn:active {
            transform: translateY(-1px);
        }
        
        .form-footer {
            text-align: center;
            margin-top: 25px;
            color: #666;
            font-size: 0.95rem;
        }
        
        .form-footer a {
            color: #ff6b9d;
            text-decoration: none;
            font-weight: 700;
        }
        
        .form-footer a:hover {
            text-decoration: underline;
        }
        
        /* 可爱装饰 */
        .decoration {
            position: absolute;
            font-size: 2rem;
            animation: float 3s ease-in-out infinite;
            opacity: 0.4;
            z-index: 1;
        }
        
        .dec-1 { top: 5%; right: 15%; animation-delay: 0s; }
        .dec-2 { bottom: 10%; left: 8%; animation-delay: 1s; }
        .dec-3 { top: 20%; right: 5%; animation-delay: 2s; }
    </style>
</head>
<body>
    <!-- 可爱装饰 -->
    <div class="decoration dec-1">🎀</div>
    <div class="decoration dec-2">🌈</div>
    <div class="decoration dec-3">💖</div>
    
    <div class="login-container">
        <div class="login-header">
            <i class="fas fa-heartbeat login-icon"></i>
            <h1>健康生活助手</h1>
            <p>记录健康，拥抱美好~ 💪</p>
        </div>
        
        <!-- 标签页 -->
        <div class="auth-tabs">
            <button class="auth-tab active" onclick="switchTab('login')">登录 🔑</button>
            <button class="auth-tab" onclick="switchTab('register')">注册 📝</button>
        </div>
        
        <!-- 登录表单 -->
        <form id="login-form" class="auth-form active" onsubmit="return false;">
            <div class="form-group">
                <label for="login-email"><i class="fas fa-envelope"></i> 邮箱</label>
                <input type="email" id="login-email" placeholder="请输入邮箱" required>
            </div>
            <div class="form-group">
                <label for="login-password"><i class="fas fa-lock"></i> 密码</label>
                <input type="password" id="login-password" placeholder="请输入密码" required>
            </div>
            <button type="button" class="auth-btn" onclick="handleLogin()">
                <i class="fas fa-sign-in-alt"></i> 登录 🚀
            </button>
            <div class="form-footer">
                <p>还没有账号？ <a href="#" onclick="switchTab('register')">立即注册 ✨</a></p>
            </div>
        </form>
        
        <!-- 注册表单 -->
        <form id="register-form" class="auth-form" onsubmit="return false;">
            <div class="form-group">
                <label for="register-name"><i class="fas fa-user"></i> 昵称</label>
                <input type="text" id="register-name" placeholder="请输入昵称" required>
            </div>
            <div class="form-group">
                <label for="register-email"><i class="fas fa-envelope"></i> 邮箱</label>
                <input type="email" id="register-email" placeholder="请输入邮箱" required>
            </div>
            <div class="form-group">
                <label for="register-password"><i class="fas fa-lock"></i> 密码</label>
                <input type="password" id="register-password" placeholder="至少6位密码" required>
            </div>
            <div class="form-group">
                <label for="register-confirm-password"><i class="fas fa-lock"></i> 确认密码</label>
                <input type="password" id="register-confirm-password" placeholder="再次输入密码" required>
            </div>
            <button type="button" class="auth-btn" onclick="handleRegister()">
                <i class="fas fa-user-plus"></i> 注册 🎉
            </button>
            <div class="form-footer">
                <p>已有账号？ <a href="#" onclick="switchTab('login')">立即登录 🔑</a></p>
            </div>
        </form>
    </div>
    
    <script>
        // ==================== 标签页切换 ====================
        function switchTab(tab) {
            // 更新标签样式
            document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            
            // 显示对应表单
            document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
            document.getElementById(tab + '-form').classList.add('active');
        }
        
        // ==================== 登录功能 ====================
        function handleLogin() {
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value;
            
            if (!email || !password) {
                alert('请填写完整的登录信息！⚠️');
                return;
            }
            
            // 从localStorage获取用户数据
            const users = JSON.parse(localStorage.getItem('healthAppUsers') || '[]');
            const user = users.find(u => u.email === email && u.password === password);
            
            if (user) {
                localStorage.setItem('healthAppCurrentUser', JSON.stringify(user));
                alert('登录成功！欢迎回来，' + user.name + '！🎉');
                window.location.href = 'main-final.html';
            } else {
                alert('邮箱或密码错误！请检查后重试。❌');
            }
        }
        
        // ==================== 注册功能 ====================
        function handleRegister() {
            const name = document.getElementById('register-name').value.trim();
            const email = document.getElementById('register-email').value.trim();
            const password = document.getElementById('register-password').value;
            const confirmPassword = document.getElementById('register-confirm-password').value;
            
            // 验证
            if (!name || !email || !password || !confirmPassword) {
                alert('请填写完整的注册信息！⚠️');
                return;
            }
            
            if (password !== confirmPassword) {
                alert('两次输入的密码不一致！❌');
                return;
            }
            
            if (password.length < 6) {
                alert('密码长度至少6位！🔐');
                return;
            }
            
            // 检查邮箱格式
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                alert('请输入有效的邮箱地址！📧');
                return;
            }
            
            // 检查邮箱是否已存在
            const users = JSON.parse(localStorage.getItem('healthAppUsers') || '[]');
            if (users.find(u => u.email === email)) {
                alert('该邮箱已注册！请直接登录。🔔');
                switchTab('login');
                return;
            }
            
            // 创建新用户
            const newUser = {
                id: 'user_' + Date.now(),
                name: name,
                email: email,
                password: password,
                createdAt: new Date().toISOString()
            };
            
            users.push(newUser);
            localStorage.setItem('healthAppUsers', JSON.stringify(users));
            
            // 自动登录
            localStorage.setItem('healthAppCurrentUser', JSON.stringify(newUser));
            
            alert('注册成功！欢迎，' + name + '！🎉\n\n现在你可以开始使用健康生活助手了~ 💪');
            window.location.href = 'main-final.html';
        }
        
        // ==================== 表单提交处理 ====================
        document.addEventListener('submit', function(e) {
            e.preventDefault();
            return false;
        });
        
        // 允许按Enter键提交
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                const activeForm = document.querySelector('.auth-form.active');
                if (activeForm.id === 'login-form') {
                    handleLogin();
                } else if (activeForm.id === 'register-form') {
                    handleRegister();
                }
            }
        });
        
        console.log('✅ 登录页面已加载！');
        console.log('🎨 可爱风格已应用！');
    </script>
</body>
</html>
