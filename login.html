<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>健康生活助手 - 真正可用的版本</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 100%;
            padding: 40px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .header h1 {
            color: #667eea;
            font-size: 2rem;
            margin-bottom: 10px;
        }
        
        .header p {
            color: #666;
        }
        
        .tabs {
            display: flex;
            margin-bottom: 30px;
            border-bottom: 2px solid #eee;
        }
        
        .tab {
            flex: 1;
            padding: 12px;
            background: none;
            border: none;
            font-size: 1.1rem;
            color: #666;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }
        
        .tab.active {
            color: #667eea;
            font-weight: 600;
        }
        
        .tab.active::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            right: 0;
            height: 2px;
            background: #667eea;
        }
        
        .form {
            display: none;
        }
        
        .form.active {
            display: block;
            animation: fadeIn 0.3s;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .btn:hover {
            transform: translateY(-2px);
        }
        
        .btn:active {
            transform: translateY(0);
        }
        
        .switch-link {
            text-align: center;
            margin-top: 20px;
            color: #666;
        }
        
        .switch-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }
        
        .switch-link a:hover {
            text-decoration: underline;
        }
        
        .message {
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
        
        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .message.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
        
        .message.show {
            display: block;
            animation: fadeIn 0.3s;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-heartbeat"></i> 健康生活助手</h1>
            <p>真正可用的版本 - 扫码或点击链接访问</p>
        </div>
        
        <div class="message" id="message"></div>
        
        <div class="tabs">
            <button class="tab active" onclick="switchTab('login')">登录</button>
            <button class="tab" onclick="switchTab('register')">注册</button>
        </div>
        
        <!-- 登录表单 -->
        <form class="form active" id="login-form">
            <div class="form-group">
                <label for="login-email"><i class="fas fa-envelope"></i> 邮箱</label>
                <input type="email" id="login-email" placeholder="请输入邮箱" required>
            </div>
            <div class="form-group">
                <label for="login-password"><i class="fas fa-lock"></i> 密码</label>
                <input type="password" id="login-password" placeholder="请输入密码" required>
            </div>
            <button type="submit" class="btn">登录</button>
            <div class="switch-link">
                还没有账号？<a href="#" onclick="switchTab('register'); return false;">立即注册</a>
            </div>
        </form>
        
        <!-- 注册表单 -->
        <form class="form" id="register-form">
            <div class="form-group">
                <label for="register-name"><i class="fas fa-user"></i> 姓名</label>
                <input type="text" id="register-name" placeholder="请输入姓名" required>
            </div>
            <div class="form-group">
                <label for="register-email"><i class="fas fa-envelope"></i> 邮箱</label>
                <input type="email" id="register-email" placeholder="请输入邮箱" required>
            </div>
            <div class="form-group">
                <label for="register-password"><i class="fas fa-lock"></i> 密码</label>
                <input type="password" id="register-password" placeholder="请输入密码（至少6位）" required>
            </div>
            <div class="form-group">
                <label for="register-confirm"><i class="fas fa-lock"></i> 确认密码</label>
                <input type="password" id="register-confirm" placeholder="请再次输入密码" required>
            </div>
            <button type="submit" class="btn">注册</button>
            <div class="switch-link">
                已有账号？<a href="#" onclick="switchTab('login'); return false;">立即登录</a>
            </div>
        </form>
    </div>

    <script>
        // ==================== 工具函数 ====================
        function showMessage(text, type = 'info') {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = text;
            messageDiv.className = `message ${type} show`;
            
            setTimeout(() => {
                messageDiv.classList.remove('show');
            }, 3000);
        }
        
        function switchTab(tabName) {
            // 更新标签样式
            document.querySelectorAll('.tab').forEach(tab => {
                tab.classList.remove('active');
            });
            event.target.classList.add('active');
            
            // 显示对应表单
            document.querySelectorAll('.form').forEach(form => {
                form.classList.remove('active');
            });
            document.getElementById(tabName + '-form').classList.add('active');
            
            // 清除消息
            document.getElementById('message').classList.remove('show');
        }
        
        // ==================== 表单提交处理 ====================
        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value;
            
            if (!email || !password) {
                showMessage('请填写完整的登录信息！', 'error');
                return;
            }
            
            // 获取用户列表
            const users = JSON.parse(localStorage.getItem('healthAppUsers') || '[]');
            const user = users.find(u => u.email === email && u.password === password);
            
            if (user) {
                showMessage('登录成功！正在跳转...', 'success');
                
                // 保存当前用户
                localStorage.setItem('healthAppCurrentUser', JSON.stringify(user));
                
                // 延迟跳转
                setTimeout(() => {
                    window.location.href = 'main.html';
                }, 1500);
            } else {
                showMessage('邮箱或密码错误！', 'error');
            }
        });
        
        document.getElementById('register-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const name = document.getElementById('register-name').value.trim();
            const email = document.getElementById('register-email').value.trim();
            const password = document.getElementById('register-password').value;
            const confirmPassword = document.getElementById('register-confirm').value;
            
            // 验证
            if (!name || !email || !password || !confirmPassword) {
                showMessage('请填写完整的注册信息！', 'error');
                return;
            }
            
            if (password !== confirmPassword) {
                showMessage('两次输入的密码不一致！', 'error');
                return;
            }
            
            if (password.length < 6) {
                showMessage('密码长度至少6位！', 'error');
                return;
            }
            
            // 检查邮箱格式
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                showMessage('请输入有效的邮箱地址！', 'error');
                return;
            }
            
            // 检查邮箱是否已存在
            const users = JSON.parse(localStorage.getItem('healthAppUsers') || '[]');
            if (users.find(u => u.email === email)) {
                showMessage('该邮箱已注册！请直接登录。', 'error');
                switchTab('login');
                return;
            }
            
            // 创建新用户
            const newUser = {
                id: 'user_' + Date.now(),
                name: name,
                email: email,
                password: password,
                createdAt: new Date().toISOString()
            };
            
            users.push(newUser);
            localStorage.setItem('healthAppUsers', JSON.stringify(users));
            
            showMessage('注册成功！正在自动登录...', 'success');
            
            // 自动登录
            localStorage.setItem('healthAppCurrentUser', JSON.stringify(newUser));
            
            // 延迟跳转
            setTimeout(() => {
                window.location.href = 'main.html';
            }, 1500);
        });
        
        // ==================== 页面加载时检查是否已登录 ====================
        window.addEventListener('load', function() {
            const currentUser = localStorage.getItem('healthAppCurrentUser');
            if (currentUser) {
                // 已登录，直接跳转
                window.location.href = 'main.html';
            }
        });
    </script>
</body>
</html>
